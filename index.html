<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web制作基礎 100本ノック</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .card-container {
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }
        .card-container.is-flipped {
            transform: rotateY(180deg);
        }

        /* アニメーション */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
        .animate-slideUp { animation: slideUp 0.4s ease-out; }

        /* スクロールバー非表示（モダンブラウザ） */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 text-slate-800">

    <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100 relative">
        
        <!-- Header -->
        <div id="header" class="px-6 py-4 border-b border-slate-50 flex justify-between items-center bg-white relative z-10 hidden">
            <h1 class="text-sm md:text-lg font-bold text-indigo-600 flex items-center gap-2">
                Web制作基礎 100本ノック
            </h1>
            <div class="flex gap-1.5 md:gap-2">
                <button onclick="openOverlay('mastered')" class="text-[9px] md:text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded-md flex items-center gap-1 border border-green-100 hover:bg-green-100 transition-colors">
                    <i data-lucide="check" class="w-3 h-3"></i> <span id="count-mastered">0</span> 習得
                </button>
                <button onclick="openOverlay('unsure')" class="text-[9px] md:text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-1 rounded-md flex items-center gap-1 border border-amber-100 hover:bg-amber-100 transition-colors">
                    <i data-lucide="help-circle" class="w-3 h-3"></i> <span id="count-unsure">0</span> 不安
                </button>
                <span class="text-[9px] md:text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md border border-slate-200">
                    <span id="current-pos">1</span> / 100
                </span>
            </div>
        </div>

        <div class="p-6 md:p-10">
            <!-- Start Screen -->
            <div id="screen-start" class="py-8 text-center space-y-6 animate-fadeIn">
                <div class="bg-indigo-50 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto">
                    <i data-lucide="languages" class="w-10 h-10 text-indigo-500"></i>
                </div>
                <div class="space-y-2">
                    <h2 class="text-2xl font-black tracking-tight">学習スタート</h2>
                    <p class="text-slate-500 text-sm leading-relaxed">
                        Web制作の基本から専門用語まで<br />全100問のフラッシュカードです。
                    </p>
                </div>
                
                <div class="flex flex-col gap-3 pt-4">
                    <button onclick="startGame(false)" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold transition-all shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 active:scale-95">
                        <i data-lucide="play" class="w-5 h-5 fill-current"></i> 順番通りに開始
                    </button>
                    <button onclick="startGame(true)" class="w-full py-4 bg-white border-2 border-slate-100 hover:border-indigo-200 text-slate-600 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 active:scale-95">
                        <i data-lucide="shuffle" class="w-5 h-5"></i> シャッフルして開始
                    </button>
                </div>

                <div class="pt-2 flex items-center justify-center">
                     <label class="flex items-center cursor-pointer gap-2 text-sm text-slate-500 hover:text-indigo-600 transition-colors">
                        <input type="checkbox" id="check-answer-first" class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
                        答え（用語）を先に表示する
                     </label>
                </div>
            </div>

            <!-- Playing Screen -->
            <div id="screen-playing" class="hidden space-y-6 animate-fadeIn">
                <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-700 ease-out" style="width: 0%"></div>
                </div>

                <div class="perspective-1000 h-[28rem] w-full">
                    <div id="flashcard" onclick="flipCard()" class="card-container relative w-full h-full cursor-pointer">
                        <!-- Front -->
                        <div class="absolute inset-0 backface-hidden bg-white border-2 border-slate-100 rounded-[2rem] flex flex-col items-center justify-center p-8 text-center shadow-sm">
                            <span id="card-genre" class="absolute top-8 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border">
                                GENRE
                            </span>
                            <div class="flex-1 flex items-center justify-center mt-4">
                                <p id="card-front-text" class="text-xl md:text-2xl font-bold leading-snug"></p>
                            </div>
                            <div class="mt-6 flex items-center gap-2 text-indigo-600 text-sm font-black bg-indigo-50 px-6 py-3 rounded-2xl border-2 border-indigo-100">
                                <i data-lucide="mouse-pointer-click" class="w-4 h-4"></i>
                                <span>タップで答えを確認</span>
                            </div>
                        </div>
                        <!-- Back -->
                        <div class="absolute inset-0 backface-hidden bg-indigo-600 border-2 border-indigo-500 rounded-[2rem] flex flex-col p-8 rotate-y-180 shadow-indigo-200 shadow-2xl overflow-y-auto hide-scrollbar">
                            <div class="text-center">
                                <span id="card-back-label" class="text-[10px] font-bold text-indigo-200 uppercase tracking-[0.2em]">ANSWER</span>
                                <div class="my-6">
                                    <p id="card-back-text" class="text-2xl md:text-3xl font-black text-white leading-snug"></p>
                                </div>
                            </div>
                            <div class="mt-auto pt-6 border-t border-indigo-400/30">
                                <span class="text-[10px] font-black text-indigo-200 uppercase tracking-widest block mb-2 text-center">解説</span>
                                <p id="card-description-text" class="text-sm md:text-base font-medium text-white/90 leading-relaxed text-left"></p>
                            </div>
                            <div class="mt-6 text-indigo-200 text-[10px] font-bold bg-white/10 px-4 py-2 rounded-full text-center shrink-0">
                                タップで問題に戻る
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-4">
                    <div class="flex items-center justify-center gap-3">
                        <button onclick="prevCard()" id="btn-prev" class="px-4 py-5 bg-white border border-slate-200 text-slate-600 rounded-2xl transition-all flex items-center gap-1 active:scale-95 disabled:opacity-30">
                            <i data-lucide="chevron-left" class="w-5 h-5"></i>
                            <span class="font-bold">戻る</span>
                        </button>
                        <button onclick="markMastered()" class="flex-[1.2] py-5 bg-green-600 hover:bg-green-700 text-white rounded-2xl font-black text-lg transition-all shadow-xl shadow-green-100 flex items-center justify-center gap-2 active:scale-95">
                            <i data-lucide="check-circle-2" class="w-6 h-6"></i> 覚えた！
                        </button>
                        <button onclick="markUnsure()" class="flex-1 py-5 bg-amber-500 hover:bg-amber-600 text-white rounded-2xl font-bold text-lg transition-all shadow-xl shadow-amber-100 flex items-center justify-center gap-2 active:scale-95">
                            <i data-lucide="help-circle" class="w-6 h-6"></i> 不安...
                        </button>
                    </div>
                    <button onclick="showScreen('start')" class="mt-2 py-3 px-6 text-slate-400 hover:text-indigo-500 text-xs font-bold transition-all flex items-center justify-center gap-2 hover:bg-slate-50 rounded-xl">
                        <i data-lucide="home" class="w-3.5 h-3.5"></i> TOPへと戻る
                    </button>
                </div>
            </div>

            <!-- Finished Screen -->
            <div id="screen-finished" class="hidden py-10 text-center space-y-6 animate-fadeIn">
                <div class="relative inline-block">
                    <div class="bg-green-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto text-green-500">
                        <i data-lucide="check-circle-2" class="w-14 h-14"></i>
                    </div>
                    <div id="mastery-badge" class="absolute -top-2 -right-2 bg-yellow-400 text-white text-[10px] font-bold px-2 py-1 rounded-full shadow-sm">
                        0% MASTERED
                    </div>
                </div>
                <div class="space-y-2">
                    <h2 class="text-2xl font-black">学習終了！</h2>
                    <div class="flex justify-center gap-4 py-2">
                        <button onclick="openOverlay('mastered')" class="text-center hover:scale-105 transition-transform">
                            <p id="final-mastered" class="text-green-600 text-xl font-black">0</p>
                            <p class="text-slate-400 text-[10px] font-bold">習得済み</p>
                        </button>
                        <button onclick="openOverlay('unsure')" class="text-center hover:scale-105 transition-transform">
                            <p id="final-unsure" class="text-amber-600 text-xl font-black">0</p>
                            <p class="text-slate-400 text-[10px] font-bold">不安あり</p>
                        </button>
                    </div>
                    <p class="text-slate-400 text-xs">不安な問題をゼロにするのが目標です！</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl text-left flex gap-3 border border-slate-100">
                    <i data-lucide="info" class="text-indigo-500 shrink-0 w-5 h-5"></i>
                    <p class="text-[11px] text-slate-500 leading-tight">
                        ※注記: 一般的に、ユーザーを次の行動へ促す要素は「CTA（Call to Action）」と呼ばれます。
                    </p>
                </div>
                <div class="pt-6 flex flex-col gap-2">
                    <button onclick="startGame(false)" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold transition-all flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-indigo-100">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i> 最初からやり直す
                    </button>
                    <button onclick="showScreen('start')" class="w-full py-4 bg-white border-2 border-slate-100 hover:border-indigo-100 text-slate-600 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 active:scale-95">
                        <i data-lucide="home" class="w-5 h-5"></i> TOP画面へ戻る
                    </button>
                </div>
            </div>
        </div>

        <!-- List Overlay -->
        <div id="overlay" class="absolute inset-0 z-50 bg-slate-900/40 backdrop-blur-sm hidden animate-fadeIn items-end">
            <div class="bg-white w-full h-[85%] rounded-t-[2.5rem] flex flex-col shadow-2xl animate-slideUp">
                <div class="p-6 flex justify-between items-center border-b border-slate-100">
                    <div class="flex items-center gap-2">
                        <div id="overlay-icon-box" class="p-2 rounded-xl">
                            <i id="overlay-icon" class="w-4 h-4"></i>
                        </div>
                        <div>
                            <h3 id="overlay-title" class="font-black text-slate-800">リスト</h3>
                            <p id="overlay-count" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">0 items</p>
                        </div>
                    </div>
                    <button onclick="closeOverlay()" class="p-2 bg-slate-50 rounded-full text-slate-400 hover:bg-slate-100 active:scale-90 transition-all">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div id="overlay-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50">
                    <!-- Dynamic Items -->
                </div>
            </div>
        </div>
    </div>

    <p class="mt-8 text-slate-400 text-[10px] uppercase tracking-widest font-bold">
        Web Production Terminology Course
    </p>

    <script>
        // クイズデータ（全100問 + 解説を追加）
        const initialCards = [
            { id: 1, genre: "基本技術", question: "ウェブサイトの骨組みや情報構造を記述するための言語は何ですか？", answer: "HTML", description: "HyperText Markup Languageの略。タグを使って見出しや段落などの構造を指定します。" },
            { id: 2, genre: "基本技術", question: "HTMLで記述する際に重要な「検索エンジンに見つけてもらいやすくする工夫」を何と呼びますか？", answer: "SEO", description: "Search Engine Optimization（検索エンジン最適化）。適切なタグ選びやキーワード配置が重要です。" },
            { id: 3, genre: "基本技術", question: "視覚や操作に制限のある人にも情報を正しく届けるための対応を何と呼びますか？", answer: "アクセシビリティ", description: "誰でも、どんなデバイスでも同じように情報を得られるようにする設計の配慮です。" },
            { id: 4, genre: "基本技術", question: "ウェブサイトの見た目（文字の大きさ、色、配置など）を整えるための言語は何ですか？", answer: "CSS", description: "Cascading Style Sheetsの略。HTMLで定義した構造に対し、デザインを適用します。" },
            { id: 5, genre: "基本技術", question: "画面サイズに合わせてレイアウトを調整するデザイン手法を何と呼びますか？", answer: "レスポンシブデザイン", description: "PC、タブレット、スマホなど、異なる画面幅に対応させる単一のファイル管理手法です。" },
            { id: 6, genre: "基本技術", question: "ウェブサイトに動きや反応を加えるための言語は何ですか？", answer: "JavaScript", description: "ブラウザ上で動作するプログラミング言語。スライドショーやバリデーションなどに使われます。" },
            { id: 7, genre: "基本技術", question: "HTML、CSS、JavaScriptの3つの技術を組み合わせることで、どのようなウェブサイトが実現できますか？", answer: "情報が伝わり、見た目が分かりやすく、使い勝手の良いサイト", description: "構造・装飾・動作の3要素が揃うことで、現代的なWebサイトが完成します。" },
            { id: 8, genre: "基本技術", question: "ウェブサイトの内容を管理・更新するためのシステムを何と呼びますか？", answer: "CMS", description: "Content Management Systemの略。専門知識がなくてもWebサイトを管理できるツールです。" },
            { id: 9, genre: "基本技術", question: "CMSを導入する最大のメリットは何ですか？", answer: "コードを書かずに、管理画面から簡単に更新作業ができること", description: "エンジニア以外の担当者でもブログ更新や情報の追加が容易になります。" },
            { id: 10, genre: "基本技術", question: "CMSを導入することで、企業の情報発信はどう変わりますか？", answer: "エンジニアに頼らず企画職などが更新でき、スピードと効率が向上する", description: "外注コストの削減や、タイムリーな情報発信が可能になります。" },
            { id: 11, genre: "基本技術", question: "使いやすいCMSを構築するための設計のポイントは何ですか？", answer: "更新頻度に合わせて編集範囲を制限するなど、使う人目線で設計すること", description: "多機能すぎると使いにくくなるため、運用者のITスキルに合わせたカスタイマイズが重要です。" },
            { id: 12, genre: "サーバー・仕組み", question: "ウェブサイトを表示するために必要な、インターネット上の「家」に例えられるものは何ですか？", answer: "Webサーバー", description: "ファイルを保管し、ユーザーの要求に応じてデータを送信する役割を持つコンピュータです。" },
            { id: 13, genre: "サーバー・仕組み", question: "ユーザーが検索結果をクリックした際、最初にサーバーの場所を問い合わせるシステムは何ですか？", answer: "DNS", description: "Domain Name System。ドメイン名（URL）をIPアドレスに変換する、ネット上の電話帳のような仕組みです。" },
            { id: 14, genre: "サーバー・仕組み", question: "インターネット上の「住所」に該当する、サーバーの場所を示す番号は何ですか？", answer: "IPアドレス", description: "192.168...のような数字の羅列。ネット上の各デバイスを特定するための識別番号です。" },
            { id: 15, genre: "サーバー・仕組み", question: "URLの中に含まれる、IPアドレスと紐付いている文字列を何と呼びますか？", answer: "ドメイン", description: "example.comのような形式。数字のIPアドレスを人間が覚えやすい言葉に置き換えたものです。" },
            { id: 16, genre: "サーバー・仕組み", question: "サーバーからダウンロードしたファイルをブラウザが解析し、画面に表示する処理は何ですか？", answer: "レンダリング", description: "ブラウザがHTML/CSSなどを読み込んで、私たちが目にするWebページへと組み立てる工程です。" },
            { id: 17, genre: "基本技術", question: "ブラウザ側で動くHTMLやCSS、JavaScriptなどを総称して何言語と呼びますか？", answer: "クライアントサイドの言語", description: "ユーザー（クライアント）の手元にあるブラウザ上で直接処理される技術のことです。" },
            { id: 18, genre: "基本技術", question: "サーバー側で動くPHPなどを総称して何言語と呼びますか？", answer: "サーバーサイドの言語", description: "Webサーバーの中で処理が行われ、結果のみがブラウザに送られる技術のことです。" },
            { id: 19, genre: "基本技術", question: "クライアントサイドとサーバーサイド、どちらの言語がイベント（ユーザーの動き）を感知できますか？", answer: "クライアントサイドの言語", description: "クリック、スクロール、入力などのリアルタイムな挙動を捉えるのが得意です。" },
            { id: 20, genre: "基本技術", question: "フリーワード検索の結果に応じてHTMLを生成するのは、どちらの言語の役割ですか？", answer: "サーバーサイドの言語", description: "データベースと連携して動的に情報を組み立てるのはサーバー側の重要な役割です。" },
            { id: 21, genre: "制作・ツール", question: "コーディングに使う人気のソフトウェア（エディター）の代表例は何ですか？", answer: "Visual Studio Code", description: "Microsoftが開発。拡張機能が豊富で、現在のWeb制作業界で最も標準的なツールです。" },
            { id: 22, genre: "制作・ツール", question: "自分のパソコン上に作る開発環境のことを何と呼びますか？", answer: "ローカル環境", description: "公開サーバーへ上げる前に、安全に制作やテストを行うための自分の端末内の領域です。" },
            { id: 23, genre: "サーバー・仕組み", question: "ブログの記事データなどが蓄積されている「箱」のようなシステムを何と呼びますか？", answer: "データベース", description: "大量のデータを効率的に整理・保管・検索するための専用システムです（MySQLなど）。" },
            { id: 24, genre: "サーバー・仕組み", question: "データベースから必要な情報を引き出してHTMLを生成するのは、どこで行われる処理ですか？", answer: "Webサーバー上", description: "PHPなどがデータベースにアクセスし、記事を埋め込んだHTMLを作成してブラウザへ返します。" },
            { id: 25, genre: "サーバー・仕組み", question: "HTML、CSS、JavaScriptのみのサイトではデータベースは必要ですか？", answer: "不要", description: "「静的サイト」と呼ばれ、サーバーにあるファイルをそのまま表示するだけなのでDBは使いません。" },
            { id: 26, genre: "サーバー・仕組み", question: "ローカル環境とサーバーを繋ぎ、ファイルをアップロードするためのソフトは何ですか？", answer: "FTPソフト", description: "File Transfer Protocol用ソフト。FileZillaなどが有名です。" },
            { id: 27, genre: "解析・SEO", question: "Googleなどの検索エンジンで使われる、ウェブサイトの情報を収集するロボットは何ですか？", answer: "クローラー", description: "ネット上を巡回し、Webサイトの内容をスキャンしてGoogleの索引に登録するプログラムです。" },
            { id: 28, genre: "解析・SEO", question: "サイト公開時に、クローラーに情報収集に来てもらうようお願いする作業は何ですか？", answer: "インデックスリクエスト", description: "サーチコンソールなどを使って、新しいサイトが存在することをGoogleに通知する作業です。" },
            { id: 29, genre: "解析・SEO", question: "検索順位を決めるためのGoogleの仕組みを何と呼びますか？", answer: "アルゴリズム", description: "200以上の評価基準があるとされ、ユーザーに役立つサイトほど上位になるよう設計されています。" },
            { id: 30, genre: "解析・SEO", question: "検索結果で上位に表示させるための施策を何と呼びますか？", answer: "SEO対策", description: "キーワード選定、内部構造の最適化、良質なコンテンツ作成などが含まれます。" },

        let unsureIds = new Set();

        // UI Helpers
        function showScreen(screenId) {
            ['screen-start', 'screen-playing', 'screen-finished'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById('screen-' + screenId).classList.remove('hidden');
            
            if (screenId === 'playing') {
                document.getElementById('header').classList.remove('hidden');
            } else {
                document.getElementById('header').classList.add('hidden');
            }
        }

        function getGenreColor(genre) {
            switch (genre) {
                case "基本技術": return "bg-blue-50 text-blue-600 border-blue-100";
                case "サーバー・仕組み": return "bg-purple-50 text-purple-600 border-purple-100";
                case "デザイン・設計": return "bg-pink-50 text-pink-600 border-pink-100";
                case "解析・ツール": return "bg-amber-50 text-amber-600 border-amber-100";
                case "制作・ツール": return "bg-teal-50 text-teal-600 border-teal-100";
                default: return "bg-slate-50 text-slate-600 border-slate-100";
            }
        }

        // Game Logic
        function startGame(shuffle) {
            cards = [...initialCards];
            if (shuffle) {
                cards.sort(() => Math.random() - 0.5);
            }
            currentIndex = 0;
            isFlipped = false;
            masteredIds = new Set();
            unsureIds = new Set();
            showAnswerFirst = document.getElementById('check-answer-first').checked;
            
            updateCardUI();
            updateStats();
            showScreen('playing');
        }

        function flipCard() {
            isFlipped = !isFlipped;
            const card = document.getElementById('flashcard');
            if (isFlipped) {
                card.classList.add('is-flipped');
            } else {
                card.classList.remove('is-flipped');
            }
        }

            const genreEl = document.getElementById('card-genre');
            
            genreEl.className = `absolute top-8 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border ${getGenreColor(card.genre)}`;
            genreEl.innerText = card.genre;

            if (showAnswerFirst) {
                document.getElementById('card-front-text').innerText = card.answer;
                document.getElementById('card-back-text').innerText = card.question;
                document.getElementById('card-back-label').innerText = "QUESTION (DETAILS)";
                document.getElementById('card-description-text').innerText = card.description;
            } else {
                document.getElementById('card-front-text').innerText = card.question;
                document.getElementById('card-back-text').innerText = card.answer;
                document.getElementById('card-back-label').innerText = "ANSWER";
                document.getElementById('card-description-text').innerText = card.description;
            }

            const progress = ((currentIndex + 1) / cards.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('current-pos').innerText = currentIndex + 1;
            document.getElementById('btn-prev').disabled = currentIndex === 0;

            isFlipped = false;
            document.getElementById('flashcard').classList.remove('is-flipped');
            document.getElementById('flashcard').scrollTop = 0; // スクロール位置リセット
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                updateCardUI();
            } else {
                finishGame();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCardUI();
            }
        }

        function markMastered() {
            const id = cards[currentIndex].id;
            unsureIds.delete(id);
            masteredIds.add(id);
            updateStats();
            nextCard();
        }

        function markUnsure() {
            const id = cards[currentIndex].id;
            masteredIds.delete(id);
            unsureIds.add(id);
            updateStats();
            nextCard();
        }

        function updateStats() {
            document.getElementById('count-mastered').innerText = masteredIds.size;
            document.getElementById('count-unsure').innerText = unsureIds.size;
        }

        function finishGame() {
            const masteryRate = Math.round((masteredIds.size / cards.length) * 100);
            document.getElementById('mastery-badge').innerText = `${masteryRate}% MASTERED`;
            document.getElementById('final-mastered').innerText = masteredIds.size;
            document.getElementById('final-unsure').innerText = unsureIds.size;
            showScreen('finished');
        }

        // Overlay Logic
        function openOverlay(type) {
            const overlay = document.getElementById('overlay');
            const listContainer = document.getElementById('overlay-list');
            const targetSet = type === 'unsure' ? unsureIds : masteredIds;
            const items = initialCards.filter(c => targetSet.has(c.id));
            
            document.getElementById('overlay-title').innerText = type === 'unsure' ? '不安な問題' : '習得した問題';
            document.getElementById('overlay-count').innerText = `${items.length} items`;
            
            const iconBox = document.getElementById('overlay-icon-box');
            const icon = document.getElementById('overlay-icon');
            if (type === 'unsure') {
                iconBox.className = 'p-2 rounded-xl bg-amber-100 text-amber-600';
                icon.setAttribute('data-lucide', 'help-circle');
            } else {
                iconBox.className = 'p-2 rounded-xl bg-green-100 text-green-600';
                icon.setAttribute('data-lucide', 'check-circle-2');
            }

            listContainer.innerHTML = '';
            if (items.length === 0) {
                listContainer.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 space-y-2 py-20">
                        <i data-lucide="info" class="w-8 h-8 opacity-50"></i>
                        <p class="text-sm font-medium">該当する問題はありません</p>
                    </div>
                `;
            } else {
                items.forEach(card => {
                    const item = document.createElement('div');
                    item.className = 'bg-white p-4 rounded-2xl border border-slate-100 shadow-sm hover:border-slate-200 transition-all cursor-pointer';
                    // カード全体をクリック可能にする
                    item.onclick = () => toggleListItem(card.id);
                    item.innerHTML = `
                        <div class="flex justify-between items-start">
                            <span class="px-2 py-0.5 rounded-md text-[8px] font-black border ${getGenreColor(card.genre)}">${card.genre}</span>
                            <i data-lucide="chevron-down" id="chevron-${card.id}" class="w-4 h-4 text-slate-300 transition-transform"></i>
                        </div>
                        <p class="mt-2 text-sm font-bold text-slate-800 leading-snug">${card.question}</p>
                        <div id="answer-${card.id}" class="hidden mt-4 space-y-3">
                             <div class="bg-indigo-600 p-4 rounded-xl shadow-inner">
                                <span class="text-[10px] font-black text-indigo-200 uppercase tracking-widest border-b border-indigo-400/50 pb-1 block mb-2 text-center">答え</span>
                                <p class="text-lg font-black text-white text-center">${card.answer}</p>
                             </div>
                             <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                                <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest border-b border-indigo-200 pb-1 block mb-2">解説</span>
                                <p class="text-sm font-medium text-slate-600 leading-relaxed">${card.description}</p>
                             </div>
                        </div>
                    `;
                    listContainer.appendChild(item);
                });
            }

            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            lucide.createIcons();
        }

        function closeOverlay() {
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('overlay').classList.remove('flex');
        }

        function toggleListItem(id) {
            const ans = document.getElementById('answer-' + id);
            const chev = document.getElementById('chevron-' + id);
            if (ans.classList.contains('hidden')) {
                ans.classList.remove('hidden');
                chev.classList.add('rotate-180');
            } else {
                ans.classList.add('hidden');
                chev.classList.remove('rotate-180');
            }
        }

        // Init
        window.onload = () => {
            lucide.createIcons();
        };
    </script>
</body>
</html>
